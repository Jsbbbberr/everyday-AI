name: AI News Daily

on:
  schedule:
    - cron: '0 2 * * *'  # 每天北京时间10点（UTC 2点）
  workflow_dispatch:  # 支持手动触发

jobs:
  run-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Call Coze Workflow API
        run: |
          echo "开始调用Coze工作流..."
          echo "时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "https://fsszyxc9bk.coze.site/run" \
               -H "Authorization: Bearer eyJhbGciOiJSUzI1NiIsImtpZCI6IjQ0MGI0ZDY0LTM5ODQtNDRjYy05ZjUwLTdjZjkxYjA1NGI3OSJ9..ehElgt32zNP-_OilJWxmdEQftzEzfTkvo24o9F264grmlWTW-yfZUqy7wAHUBrpmiqUX2a6QnPsX31Y2U8eOw93NlcDZoBBU1Npcwgxf_NMkywbxQaTf-Ld_52GAqt8VEDauYrIJO_plpAf3_ubaSjvqryzLbcKXKxR0461P75ylthPCGTrtzpz5DPARCFsVnMN7eEWphkFLX3zw6vLnF1acayoBxPgMZ_Z4JnjkyYMKHcjRqLbiyaLW2O38qnPvL7GXnZKyI_Z2uehm7_BS0HpNfNI2amFM5J_YrNANdRkCQigd2WTFB3AV8IGq9-SAaXEUCbDiH4qBkCmjA2mgiQ" \
               -H "Content-Type: application/json" \
               -d '{}' \
               --max-time 120)
          
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE/d')
          
          echo "HTTP状态码: $HTTP_CODE"
          echo "响应内容: $BODY"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ 工作流触发成功"
          else
            echo "❌ 工作流触发失败，HTTP状态码: $HTTP_CODE"
            exit 1
          fi
